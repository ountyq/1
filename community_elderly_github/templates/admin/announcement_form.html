{% extends 'admin/base.html' %}
{% block title %}发布公告{% endblock %}
{% block page_title %}发布公告{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card">
  <div class="card-header px-4 py-3">
    <i class="bi bi-megaphone text-warning"></i> {{ action }}公告
  </div>
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">公告标题 <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">公告类型</label>
        <select name="ann_type" class="form-select">
          {% for v,l in type_choices %}
          <option value="{{ v }}">{{ l }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">公告内容 <span class="text-danger">*</span></label>
        <textarea name="content" class="form-control" rows="8" required placeholder="请输入公告内容..."></textarea>
      </div>
      <div class="mb-4 form-check">
        <input type="checkbox" name="is_top" id="is_top" class="form-check-input">
        <label for="is_top" class="form-check-label fw-bold">置顶显示</label>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-warning px-5 text-dark fw-bold">发布公告</button>
        <a href="/admin/announcements/" class="btn btn-outline-secondary px-4">取消</a>
      </div>
    </form>
  </div>
</div>
</div>
</div>
{% endblock %}
