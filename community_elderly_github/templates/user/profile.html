{% extends 'user/base.html' %}
{% block title %}个人中心 - 社区老年活动{% endblock %}

{% block content %}
<!-- 页面标题 -->
<div class="page-header">
    <h1><i data-lucide="user-circle"></i> 个人中心</h1>
</div>

<div class="row g-4">
    <!-- 左侧：头像卡片 -->
    <div class="col-md-4">
        <div class="content-card" style="text-align: center;">
            <div class="card-body" style="padding: 40px;">
                {% if user.avatar %}
                <img src="{{ user.avatar.url }}" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary-color); object-fit: cover;">
                {% else %}
                <div style="width: 120px; height: 120px; background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                    <i data-lucide="user" style="width: 60px; height: 60px; color: white;"></i>
                </div>
                {% endif %}
                <h3 style="font-size: 24px; font-weight: 700; margin-top: 20px; margin-bottom: 8px;">{{ user.first_name|default:user.username }}</h3>
                <span style="background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;">老年用户</span>
                <div style="color: var(--text-secondary); margin-top: 12px; font-size: 15px;">
                    <i data-lucide="map-pin" style="width: 16px; height: 16px; vertical-align: middle;"></i>
                    {{ user.area|default:"未设置片区" }}
                </div>
            </div>
        </div>
    </div>
    
    <!-- 右侧：编辑表单 -->
    <div class="col-md-8">
        <div class="content-card">
            <div class="card-header">
                <h2><i data-lucide="edit-3"></i> 编辑个人信息</h2>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label" style="font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;">真实姓名</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background: white;">
                                    <i data-lucide="user" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
                                </span>
                                <input type="text" name="real_name" class="form-control" style="font-size: 16px; padding: 14px;" value="{{ user.first_name }}" placeholder="请输入真实姓名">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;">手机号</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background: white;">
                                    <i data-lucide="phone" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
                                </span>
                                <input type="tel" name="phone" class="form-control" style="font-size: 16px; padding: 14px;" value="{{ user.phone|default:'' }}" maxlength="11" placeholder="请输入手机号">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;">年龄</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background: white;">
                                    <i data-lucide="calendar" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
                                </span>
                                <input type="number" name="age" class="form-control" style="font-size: 16px; padding: 14px;" value="{{ user.age|default:'' }}" min="50" max="120" placeholder="请输入年龄">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;">居住片区</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background: white;">
                                    <i data-lucide="map-pin" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
                                </span>
                                <input type="text" name="area" class="form-control" style="font-size: 16px; padding: 14px;" value="{{ user.area|default:'' }}" placeholder="如：东城区">
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label" style="font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;">家属手机号</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background: white;">
                                    <i data-lucide="heart" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
                                </span>
                                <input type="tel" name="family_phone" class="form-control" style="font-size: 16px; padding: 14px;" value="{{ user.family_phone|default:'' }}" maxlength="11" placeholder="用于活动提醒推送">
                            </div>
                            <div style="font-size: 13px; color: var(--text-secondary); margin-top: 6px;">
                                <i data-lucide="info" style="width: 14px; height: 14px; vertical-align: middle;"></i>
                                家属手机号将用于接收活动提醒短信
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label" style="font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;">更换头像</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background: white;">
                                    <i data-lucide="image" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
                                </span>
                                <input type="file" name="avatar" class="form-control" style="font-size: 16px; padding: 14px;" accept="image/*">
                            </div>
                        </div>
                        <div class="col-12 pt-2">
                            <button type="submit" class="btn-primary-custom" style="padding: 14px 40px;">
                                <i data-lucide="check"></i> 保存信息
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
