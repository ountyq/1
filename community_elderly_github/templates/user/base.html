<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}社区老年活动管理系统{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #3b82f6;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* ===== 顶部导航栏 - 更大气 ===== */
        .top-navbar {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            padding: 0;
            box-shadow: 0 4px 25px rgba(99, 102, 241, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .top-navbar .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }
        
        .top-navbar .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
        }
        
        .top-navbar .brand i {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .top-navbar .nav-menu {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }
        
        .top-navbar .nav-menu a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .top-navbar .nav-menu a:hover {
            background: rgba(255,255,255,0.15);
            color: white;
            transform: translateY(-2px);
        }
        
        .top-navbar .nav-menu a.active {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        
        .top-navbar .nav-menu a i {
            width: 20px;
            height: 20px;
        }
        
        .top-navbar .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.15);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .top-navbar .logout-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        
        /* ===== 主内容区 - 更宽 ===== */
        .main-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px;
            min-height: calc(100vh - 70px);
        }
        
        /* ===== 页面标题 ===== */
        .page-header {
            margin-bottom: 30px;
        }
        
        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .page-header h1 i {
            color: var(--primary-color);
        }
        
        /* ===== 卡片样式 - 更大更美观 ===== */
        .content-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .content-card .card-header {
            padding: 24px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
        }
        
        .content-card .card-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }
        
        .content-card .card-header h2 i {
            color: var(--primary-color);
            width: 24px;
            height: 24px;
        }
        
        .content-card .card-body {
            padding: 30px;
        }
        
        /* ===== 统计卡片 ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        
        .stat-card .stat-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .stat-card .stat-icon i {
            width: 32px;
            height: 32px;
            color: white;
        }
        
        .stat-card .stat-icon.primary { background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); }
        .stat-card .stat-icon.success { background: linear-gradient(135deg, var(--success-color), #34d399); }
        .stat-card .stat-icon.warning { background: linear-gradient(135deg, var(--warning-color), #fbbf24); }
        .stat-card .stat-icon.danger { background: linear-gradient(135deg, var(--danger-color), #f87171); }
        
        .stat-card .stat-info h3 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }
        
        .stat-card .stat-info p {
            font-size: 15px;
            color: var(--text-secondary);
            margin: 4px 0 0 0;
        }
        
        /* ===== 活动卡片 - 更大 ===== */
        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }
        
        .activity-card-large {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .activity-card-large:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            border-color: var(--primary-light);
        }
        
        .activity-card-large .card-image {
            height: 200px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            position: relative;
            overflow: hidden;
        }
        
        .activity-card-large .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .activity-card-large .card-image .type-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }
        
        .activity-card-large .card-image .spots-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.95);
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .activity-card-large .card-content {
            padding: 24px;
        }
        
        .activity-card-large .card-content h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .activity-card-large .card-content .meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 15px;
        }
        
        .activity-card-large .card-content .meta span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .activity-card-large .card-content .meta i {
            width: 18px;
            height: 18px;
            color: var(--primary-color);
        }
        
        /* ===== 公告列表 ===== */
        .announcement-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .announcement-item-large {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        
        .announcement-item-large:hover {
            background: #f1f5f9;
            transform: translateX(4px);
        }
        
        .announcement-item-large .icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--danger-color), #f87171);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .announcement-item-large .icon i {
            width: 24px;
            height: 24px;
            color: white;
        }
        
        .announcement-item-large .content {
            flex: 1;
        }
        
        .announcement-item-large .content h4 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        
        .announcement-item-large .content p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }
        
        .announcement-item-large .time {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        
        /* ===== 按钮样式 ===== */
        .btn-primary-custom {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
            color: white;
        }
        
        .btn-outline-custom {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .btn-outline-custom:hover {
            background: var(--primary-color);
            color: white;
        }
        
        /* ===== 表格样式 ===== */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .data-table th {
            background: #f8fafc;
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .data-table td {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .data-table tr:hover td {
            background: #f8fafc;
        }
        
        /* ===== 状态标签 ===== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status-badge.success { background: #d1fae5; color: #065f46; }
        .status-badge.warning { background: #fef3c7; color: #92400e; }
        .status-badge.danger { background: #fee2e2; color: #991b1b; }
        .status-badge.info { background: #dbeafe; color: #1e40af; }
        
        /* ===== 欢迎横幅 - 更大 ===== */
        .welcome-banner {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            border-radius: 24px;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        
        .welcome-banner .user-info {
            display: flex;
            align-items: center;
            gap: 24px;
            position: relative;
            z-index: 1;
        }
        
        .welcome-banner .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .welcome-banner .greeting h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .welcome-banner .greeting p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
        }
        
        /* ===== 两栏布局 ===== */
        .two-column-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
        }
        
        @media (max-width: 1200px) {
            .two-column-layout {
                grid-template-columns: 1fr;
            }
        }
        
        /* ===== 链接样式 ===== */
        .link-arrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary-color);
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .link-arrow:hover {
            gap: 10px;
        }
        
        .link-arrow i {
            width: 18px;
            height: 18px;
        }
        
        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .main-wrapper {
                padding: 20px;
            }
            
            .top-navbar .nav-container {
                padding: 0 20px;
            }
            
            .top-navbar .nav-menu {
                display: none;
            }
            
            .activity-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* ===== 动画 ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fadeInUp 0.5s ease-out;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="top-navbar">
        <div class="nav-container">
            <a href="/user_dashboard/" class="brand">
                <i data-lucide="home"></i>
                社区老年活动
            </a>
            
            <ul class="nav-menu">
                <li>
                    <a href="/user_dashboard/" class="{% if '/user_dashboard' in request.path %}active{% endif %}">
                        <i data-lucide="layout-dashboard"></i> 首页
                    </a>
                </li>
                <li>
                    <a href="/user/activities/" class="{% if '/user/activities' in request.path %}active{% endif %}">
                        <i data-lucide="calendar-days"></i> 活动浏览
                    </a>
                </li>
                <li>
                    <a href="/user/my_registrations/" class="{% if '/user/my_registrations' in request.path %}active{% endif %}">
                        <i data-lucide="clipboard-check"></i> 我的报名
                    </a>
                </li>
                <li>
                    <a href="/user/announcements/" class="{% if '/user/announcements' in request.path %}active{% endif %}">
                        <i data-lucide="bell"></i> 公告
                    </a>
                </li>
                <li>
                    <a href="/user/news/" class="{% if '/user/news' in request.path %}active{% endif %}">
                        <i data-lucide="newspaper"></i> 新闻
                    </a>
                </li>
                <li>
                    <a href="/user/profile/" class="{% if '/user/profile' in request.path %}active{% endif %}">
                        <i data-lucide="user-circle"></i> 个人中心
                    </a>
                </li>
            </ul>
            
            <a href="/logout/" class="logout-btn">
                <i data-lucide="log-out"></i> 退出
            </a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="main-wrapper">
        <!-- 消息提示 -->
        {% if messages %}
        <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999; margin-top: 80px;">
            {% for msg in messages %}
            <div class="toast show align-items-center text-white bg-{% if msg.tags == 'error' %}danger{% elif msg.tags == 'warning' %}warning{% else %}success{% endif %} border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body" style="font-size: 15px; padding: 16px 20px;">
                        {{ msg }}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 初始化Lucide图标
        lucide.createIcons();
        
        // 自动隐藏Toast
        setTimeout(function() {
            const toasts = document.querySelectorAll('.toast');
            toasts.forEach(toast => {
                const bsToast = bootstrap.Toast.getOrCreateInstance(toast);
                setTimeout(() => bsToast.hide(), 5000);
            });
        }, 1000);
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
