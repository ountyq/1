<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 社区老年活动管理系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        /* ===== 蓝白创意登录页 ===== */
        body {
                background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 35%, #2563EB 70%, #60A5FA 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: '微软雅黑', 'PingFang SC', sans-serif;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* ── 动态几何背景层 ── */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(96, 165, 250, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.1) 0%, transparent 60%);
            z-index: 0;
        }

        /* ── 浮动气泡容器 ── */
        .bg-bubbles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-bubbles .bubble {
            position: absolute;
            bottom: -120px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            animation: bubbleRise linear infinite;
        }

        .bg-bubbles .b1 { width: 80px; height: 80px; left: 10%;   animation-duration: 14s; animation-delay: 0s; }
        .bg-bubbles .b2 { width: 45px; height: 45px; left: 25%;   animation-duration: 18s; animation-delay: 2s; }
        .bg-bubbles .b3 { width: 120px;height: 120px;left: 55%;   animation-duration: 22s; animation-delay: 4s; }
        .bg-bubbles .b4 { width: 60px; height: 60px; left: 75%;   animation-duration: 16s; animation-delay: 1s; }
        .bg-bubbles .b5 { width: 90px; height: 90px; left: 88%;   animation-duration: 20s; animation-delay: 3s; }
        .bg-bubbles .b6 { width: 35px; height: 35px; left: 40%;   animation-duration: 12s; animation-delay: 5s; }
        .bg-bubbles .b7 { width: 150px;height: 150px;left: 3%;    animation-duration: 26s; animation-delay: 6s; }
        .bg-bubbles .b8 { width: 50px; height: 50px; left: 65%;   animation-duration: 15s; animation-delay: 7.5s;}

        @keyframes bubbleRise {
            0%   { transform: translateY(0) rotate(0deg);           opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(720deg);  opacity: 0; }
        }

        /* ── 浮动几何图形 ── */
        .geo-shape {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            opacity: 0.07;
        }

        .geo-shape.g1 {
            top: 12%; left: 8%;
            width: 60px; height: 60px;
            border: 2px solid #fff;
            border-radius: 12px;
            animation: geoFloat1 8s ease-in-out infinite;
        }
        .geo-shape.g2 {
            top: 65%; left: 5%;
            width: 0; height: 0;
            border-left:  30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 52px solid rgba(255,255,255,0.7);
            animation: geoFloat2 10s ease-in-out infinite;
        }
        .geo-shape.g3 {
            top: 20%; right: 10%;
            width: 70px; height: 70px;
            border: 2px solid #fff;
            border-radius: 50%;
            animation: geoFloat3 9s ease-in-out infinite;
        }
        .geo-shape.g4 {
            bottom: 18%; right: 8%;
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.4);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: geoFloat4 11s ease-in-out infinite;
        }
        .geo-shape.g5 {
            top: 48%; left: 15%;
            width: 20px; height: 20px;
            background: #fff;
            animation: geoFloat5 6s ease-in-out infinite;
        }

        @keyframes geoFloat1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg);     }
            50%      { transform: translate(20px, -30px) rotate(45deg); }
        }
        @keyframes geoFloat2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg);      }
            50%      { transform: translate(-15px, 25px) rotate(120deg);}
        }
        @keyframes geoFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1);         }
            50%      { transform: translate(-20px, 15px) scale(1.15);}
        }
        @keyframes geoFloat4 {
            0%, 100% { transform: translate(0, 0) rotate(0deg);     }
            50%      { transform: translate(18px, -22px) rotate(180deg);}
        }
        @keyframes geoFloat5 {
            0%, 100% { opacity: 0.07; transform: translateY(0); }
            50%      { opacity: 0.2; transform: translateY(-20px); }
        }

        /* ── 波浪装饰线（底部）── */
        .wave-line {
            position: fixed;
            bottom: 0; left: 0;
            width: 200%; height: 120px;
            z-index: 0;
            pointer-events: none;
        }
        .wave-line svg {
            width: 100%; height: 100%;
        }
        .wave-line .w1 { animation: waveMove 8s linear infinite; }
        .wave-line .w2 { animation: waveMove 12s linear infinite reverse; opacity: 0.4; }

        @keyframes waveMove {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        /* ── 登录卡片 ── */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 45px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset,
                0 -4px 30px rgba(37, 99, 235, 0.1);
            width: 100%;
            max-width: 450px;
            animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        /* 卡片顶部蓝条装饰 */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #1E40AF, #3B82F6, #60A5FA, #93C5FD, #60A5FA, #3B82F6, #1E40AF);
            background-size: 200% 100%;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            from { background-position: 0% 0%; }
            to   { background-position: 200% 0%; }
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
        }

        .login-logo .icon-wrapper {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1E40AF, #3B82F6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow:
                0 10px 35px rgba(30, 64, 175, 0.35),
                0 0 0 6px rgba(59, 130, 246, 0.12);
            animation: iconPulse 3s ease-in-out infinite;
            position: relative;
        }

        /* 图标外圈光环 */
        .login-logo .icon-wrapper::after {
            content: '';
            position: absolute;
            width: 110px; height: 110px;
            border: 2px dashed rgba(59, 130, 246, 0.25);
            border-radius: 50%;
            animation: iconRingSpin 20s linear infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 35px rgba(30, 64, 175, 0.35), 0 0 0 6px rgba(59, 130, 246, 0.12); }
            50%      { transform: scale(1.05);box-shadow: 0 15px 45px rgba(30, 64, 175, 0.45), 0 0 0 8px rgba(59, 130, 246, 0.18); }
        }

        @keyframes iconRingSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .login-logo .icon-wrapper i {
            font-size: 42px;
            color: white;
        }

        .login-logo h2 {
            color: #0F172A;
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }

        .login-logo p {
            color: #64748B;
            font-size: 15px;
            margin: 0;
            letter-spacing: 2px;
        }

        .form-label {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 20px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 16px 14px 50px;
            font-size: 16px;
            border: 2px solid #E2E8F0;
            transition: all 0.3s ease;
            width: 100%;
            background: #F8FAFC;
        }

        .form-control:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            outline: none;
            background: #fff;
        }

        .btn-login {
            background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 50%, #60A5FA 100%);
            background-size: 200% 100%;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(30, 64, 175, 0.4);
            background-position: 100% 0;
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        /* 按钮光泽扫过效果 */
        .btn-login::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn-login:hover::after {
            left: 100%;
        }

        .alert {
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 15px;
            margin-bottom: 24px;
            border: none;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            color: #64748B;
            font-size: 15px;
        }

        .register-link a {
            color: #1E40AF;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: #3B82F6;
            text-decoration: underline;
        }

        /* 加载动画 */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading .spinner {
            display: inline-block;
        }

        .loading .btn-text {
            display: none;
        }

        /* 响应式 */
        @media (max-width: 576px) {
            .login-card {
                padding: 40px 28px;
                margin: 10px;
                border-radius: 20px;
            }

            .login-logo h2 {
                font-size: 21px;
            }

            .login-logo .icon-wrapper {
                width: 72px;
                height: 72px;
            }

            .login-logo .icon-wrapper i {
                font-size: 32px;
            }

            .login-logo .icon-wrapper::after {
                width: 88px; height: 88px;
            }

            .geo-shape.g1, .geo-shape.g3 { display: none; }
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 跳过导航链接 - 无障碍 -->
    <a href="#main-content" class="skip-link">跳到主要内容</a>

    <!-- 浮动气泡背景 -->
    <div class="bg-bubbles">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
        <div class="bubble b5"></div>
        <div class="bubble b6"></div>
        <div class="bubble b7"></div>
        <div class="bubble b8"></div>
    </div>

    <!-- 几何图形装饰 -->
    <div class="geo-shape g1"></div>
    <div class="geo-shape g2"></div>
    <div class="geo-shape g3"></div>
    <div class="geo-shape g4"></div>
    <div class="geo-shape g5"></div>

    <!-- 底部波浪线 -->
    <div class="wave-line">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" class="w1">
            <path d="M0,64 C288,120 576,20 864,64 C1152,108 1296,80 1440,60 L1440,120 L0,120 Z" fill="rgba(255,255,255,0.06)"/>
        </svg>
        <svg viewBox="0 0 1440 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" class="w2">
            <path d="M0,56 C240,96 480,16 720,48 C960,80 1200,32 1440,52 L1440,100 L0,100 Z" fill="rgba(255,255,255,0.04)"/>
        </svg>
    </div>

    <div class="login-card fade-in" id="main-content">
        <div class="login-logo">
            <div class="icon-wrapper">
                <i data-lucide="home"></i>
            </div>
            <h2>社区老年活动管理系统</h2>
            <p>便捷·温馨·活力社区</p>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i data-lucide="alert-circle"></i> {{ error }}
        </div>
        {% endif %}

        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-success" role="alert">
            <i data-lucide="check-circle"></i> {{ msg }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" action="/login/" id="loginForm">
            {% csrf_token %}
            
            <div class="input-group">
                <i data-lucide="user"></i>
                <label for="username" class="form-label">用户名</label>
                <input type="text" 
                       name="username" 
                       id="username"
                       class="form-control" 
                       placeholder="请输入用户名" 
                       required
                       autocomplete="username">
            </div>
            
            <div class="input-group">
                <i data-lucide="lock"></i>
                <label for="password" class="form-label">密码</label>
                <input type="password" 
                       name="password" 
                       id="password"
                       class="form-control" 
                       placeholder="请输入密码" 
                       required
                       autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text">
                    <i data-lucide="log-in"></i> 登 录
                </span>
                <div class="spinner"></div>
            </button>
        </form>

        <div class="register-link">
            没有账号？<a href="/register/">立即注册</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 初始化Lucide图标
        lucide.createIcons();
        
        // 表单提交时显示加载动画
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
            btn.disabled = true;
        });
        
        // 输入框焦点效果
        const inputs = document.querySelectorAll('.form-control');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('i').style.color = '#3B82F6';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('i').style.color = '#94A3B8';
            });
        });
        
        // 自动隐藏警告框
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.transition = 'opacity 0.5s ease';
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 500);
            });
        }, 5000);
    </script>
</body>
</html>
