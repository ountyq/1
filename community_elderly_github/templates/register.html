<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 社区老年活动管理系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: '微软雅黑', 'PingFang SC', sans-serif;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 24px;
            padding: 50px 45px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .register-header .icon-wrapper {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #7C3AED, #A78BFA);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }
        
        .register-header .icon-wrapper i {
            font-size: 42px;
            color: white;
        }
        
        .register-header h2 {
            color: #1F2937;
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }
        
        .register-header p {
            color: #6B7280;
            font-size: 15px;
            margin: 0;
        }
        
        .form-label {
            font-size: 16px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .text-danger {
            color: #EF4444 !important;
            font-weight: 700;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }
        
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 20px;
            z-index: 10;
            transition: color 0.3s ease;
        }
        
        .form-control {
            border-radius: 12px;
            padding: 14px 16px 14px 50px;
            font-size: 16px;
            border: 2px solid #E5E7EB;
            transition: all 0.3s ease;
            width: 100%;
            background-color: white;
        }
        
        .form-control:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
            outline: none;
        }
        
        .form-control:focus + i,
        .input-group:focus-within i {
            color: #7C3AED;
        }
        
        .form-control.is-valid {
            border-color: #22C55E;
            padding-right: 45px;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3e%3cpath fill='%2322C55E' d='M2.3 6.73.6 4.53c-.4-1.77.5-2.8 1.6-3.2 1.2-.4 2.3.4 2.7 1.6.3 1.2-.5 2.3-1.6 2.7-1.2.4-2.3-.4-2.7-1.6z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }
        
        .form-control.is-invalid {
            border-color: #EF4444;
            padding-right: 45px;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' width='12' height='12'%3e%3ccircle cx='6' cy='6' r='5.5' fill='none' stroke='%23EF4444' stroke-width='1.1'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }
        
        .invalid-feedback {
            display: none;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            color: #EF4444;
            padding-left: 4px;
        }
        
        .form-control.is-invalid ~ .invalid-feedback {
            display: block;
        }
        
        .btn-register {
            background: linear-gradient(135deg, #7C3AED, #A78BFA);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
        }
        
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
            opacity: 0.95;
        }
        
        .btn-register:active {
            transform: translateY(-1px);
        }
        
        .alert {
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 15px;
            margin-bottom: 24px;
            border: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #6B7280;
            font-size: 15px;
        }
        
        .login-link a {
            color: #7C3AED;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        
        .login-link a:hover {
            color: #4C1D95;
            text-decoration: underline;
        }
        
        .form-text {
            font-size: 14px;
            color: #6B7280;
            margin-top: 4px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .register-card {
                padding: 40px 30px;
            }
            
            .register-header h2 {
                font-size: 22px;
            }
            
            .register-header .icon-wrapper {
                width: 70px;
                height: 70px;
            }
            
            .register-header .icon-wrapper i {
                font-size: 32px;
            }
        }
        
        @media (max-width: 576px) {
            .register-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-card fade-in">
        <div class="register-header">
            <div class="icon-wrapper">
                <i data-lucide="user-plus"></i>
            </div>
            <h2>用户注册</h2>
            <p>加入社区，享受丰富多彩的老年活动</p>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i data-lucide="alert-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/register/" id="registerForm" novalidate>
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6">
                    <div class="input-group">
                        <i data-lucide="user"></i>
                        <label for="username" class="form-label">
                            用户名 <span class="text-danger">*</span>
                        </label>
                        <input type="text" 
                               name="username" 
                               id="username"
                               class="form-control" 
                               placeholder="请输入用户名"
                               required
                               minlength="3"
                               maxlength="20"
                               autocomplete="username">
                        <div class="invalid-feedback">
                            请输入3-20个字符的用户名
                        </div>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="input-group">
                        <i data-lucide="lock"></i>
                        <label for="password" class="form-label">
                            密码 <span class="text-danger">*</span>
                        </label>
                        <input type="password" 
                               name="password" 
                               id="password"
                               class="form-control" 
                               placeholder="请输入密码"
                               required
                               minlength="6"
                               autocomplete="new-password">
                        <div class="invalid-feedback">
                            密码长度至少6个字符
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="input-group">
                        <i data-lucide="id-card"></i>
                        <label for="real_name" class="form-label">
                            真实姓名
                        </label>
                        <input type="text" 
                               name="real_name" 
                               id="real_name"
                               class="form-control" 
                               placeholder="请输入真实姓名"
                               autocomplete="name">
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="input-group">
                        <i data-lucide="phone"></i>
                        <label for="phone" class="form-label">
                            手机号
                        </label>
                        <input type="tel" 
                               name="phone" 
                               id="phone"
                               class="form-control" 
                               placeholder="请输入手机号"
                               maxlength="11"
                               pattern="[0-9]{11}"
                               autocomplete="tel">
                        <div class="invalid-feedback">
                            请输入11位手机号码
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="input-group">
                        <i data-lucide="calendar"></i>
                        <label for="age" class="form-label">
                            年龄
                        </label>
                        <input type="number" 
                               name="age" 
                               id="age"
                               class="form-control" 
                               placeholder="请输入年龄"
                               min="50"
                               max="120">
                        <div class="invalid-feedback">
                            年龄必须在50-120岁之间
                        </div>
                        <div class="form-text">适用于老年用户（50-120岁）</div>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="input-group">
                        <i data-lucide="map-pin"></i>
                        <label for="area" class="form-label">
                            居住片区
                        </label>
                        <input type="text" 
                               name="area" 
                               id="area"
                               class="form-control" 
                               placeholder="如：东城区"
                               autocomplete="address-level2">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn-register" id="registerBtn">
                <i data-lucide="user-plus"></i>
                <span>立即注册</span>
            </button>
        </form>

        <div class="login-link">
            已有账号？<a href="/login/">立即登录</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 初始化Lucide图标
        lucide.createIcons();
        
        // 表单验证
        const form = document.getElementById('registerForm');
        const inputs = form.querySelectorAll('.form-control');
        
        // 实时验证
        inputs.forEach(input => {
            input.addEventListener('blur', function() {
                validateInput(this);
            });
            
            input.addEventListener('input', function() {
                if (this.classList.contains('is-invalid')) {
                    validateInput(this);
                }
            });
        });
        
        function validateInput(input) {
            if (input.checkValidity()) {
                input.classList.remove('is-invalid');
                input.classList.add('is-valid');
            } else {
                input.classList.remove('is-valid');
                input.classList.add('is-invalid');
            }
        }
        
        // 表单提交验证
        form.addEventListener('submit', function(e) {
            let isValid = true;
            
            inputs.forEach(input => {
                if (input.hasAttribute('required') && !input.value.trim()) {
                    input.classList.add('is-invalid');
                    isValid = false;
                }
            });
            
            if (!isValid) {
                e.preventDefault();
                // 滚动到第一个错误
                const firstError = form.querySelector('.is-invalid');
                if (firstError) {
                    firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    firstError.focus();
                }
            }
        });
        
        // 手机号输入限制
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
        
        // 年龄输入限制
        const ageInput = document.getElementById('age');
        ageInput.addEventListener('input', function() {
            if (this.value < 50) this.value = 50;
            if (this.value > 120) this.value = 120;
        });
        
        // 自动隐藏警告框
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.transition = 'opacity 0.5s ease';
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 500);
            });
        }, 5000);
    </script>
</body>
</html>
